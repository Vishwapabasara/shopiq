<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopIQ — Shopify Intelligence Platform</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap">
    <meta name="shopify-api-key" content="7cb3bb3f9bff67af8a8a52125134b745" />
    <script>
      // App Bridge CDN requires `shop` and `host` in the URL at the moment
      // app-bridge.js initialises (synchronously, before any React code runs).
      // React Router SPA navigation strips query params, so we persist them in
      // sessionStorage and restore each one independently here.
      // sessionStorage is per-tab and carries no auth data.
      (function () {
        var p = new URLSearchParams(window.location.search);
        var shop = p.get('shop') || '';
        var host = p.get('host') || '';

        // Persist whatever arrived in this URL load
        if (shop) sessionStorage.setItem('shopiq_shop', shop);
        if (host) sessionStorage.setItem('shopiq_host', host);

        // Restore each param independently if missing from the current URL
        if (!shop) { var s = sessionStorage.getItem('shopiq_shop'); if (s) { shop = s; p.set('shop', s); } }
        if (!host) { var h = sessionStorage.getItem('shopiq_host'); if (h) { host = h; p.set('host', h); } }

        if (shop || host) {
          window.history.replaceState({}, '', window.location.pathname + '?' + p.toString());
        }

        // Inject shopify-shop meta so browser console verification passes
        if (shop) {
          var m = document.createElement('meta');
          m.name = 'shopify-shop';
          m.content = shop;
          document.head.appendChild(m);
        }
      })();
    </script>
    <script src="https://cdn.shopify.com/shopifycloud/app-bridge.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
