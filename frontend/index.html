<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopIQ — Shopify Intelligence Platform</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap">
    <meta name="shopify-api-key" content="7cb3bb3f9bff67af8a8a52125134b745" />
    <script>
      // Runs synchronously during HTML parsing, before any other scripts.
      // 1. Restores ?shop= / ?host= into the URL (React Router strips them on
      //    SPA navigation) so App Bridge reads them when it initialises below.
      // 2. Injects <meta name="shopify-shop"> so App Bridge finds the shop.
      // 3. Uses document.write() to emit the App Bridge <script> tag inline —
      //    this makes it a synchronous (non-async, non-defer) blocking script,
      //    which is what App Bridge v4 requires. It is only emitted when shop
      //    is known, so standalone visitors (no ?shop=) never load App Bridge
      //    and the page renders immediately without buffering.
      (function () {
        var p = new URLSearchParams(window.location.search);
        var shop = p.get('shop') || '';
        var host = p.get('host') || '';

        if (shop) { sessionStorage.setItem('shopiq_shop', shop); localStorage.setItem('shopiq_shop', shop); }
        if (host) { sessionStorage.setItem('shopiq_host', host); localStorage.setItem('shopiq_host', host); }

        if (!shop) { var s = sessionStorage.getItem('shopiq_shop') || localStorage.getItem('shopiq_shop'); if (s) { shop = s; p.set('shop', s); } }
        if (!host) { var h = sessionStorage.getItem('shopiq_host') || localStorage.getItem('shopiq_host'); if (h) { host = h; p.set('host', h); } }

        if (shop || host) {
          window.history.replaceState({}, '', window.location.pathname + '?' + p.toString());
        }

        if (shop) {
          var m = document.createElement('meta');
          m.name = 'shopify-shop';
          m.content = shop;
          document.head.appendChild(m);

          // document.write() during initial parsing inserts content into the
          // HTML stream synchronously — the resulting <script> tag has no
          // async or defer attribute, satisfying App Bridge's requirement.
          document.write('<script src="https://cdn.shopify.com/shopifycloud/app-bridge.js"><\/script>');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
