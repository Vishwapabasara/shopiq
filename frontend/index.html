<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopIQ — Shopify Intelligence Platform</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap">
    <meta name="shopify-api-key" content="7eb3bb3f96ff67af0a8a52125136b745" />
    <script>
      // Runs synchronously during HTML parsing, before React mounts.
      // Restores ?shop= / ?host= from storage so App Bridge finds them,
      // then loads App Bridge with async=false so it is non-blocking but
      // document.currentScript.async === false (satisfying App Bridge v4's check).
      // In standalone mode (no shop) App Bridge is skipped entirely.
      (function () {
        var p = new URLSearchParams(window.location.search);
        var shop = p.get('shop') || '';
        var host = p.get('host') || '';

        if (shop) { sessionStorage.setItem('shopiq_shop', shop); localStorage.setItem('shopiq_shop', shop); }
        if (host) { sessionStorage.setItem('shopiq_host', host); localStorage.setItem('shopiq_host', host); }

        if (!shop) { var s = sessionStorage.getItem('shopiq_shop') || localStorage.getItem('shopiq_shop'); if (s) { shop = s; p.set('shop', s); } }
        if (!host) { var h = sessionStorage.getItem('shopiq_host') || localStorage.getItem('shopiq_host'); if (h) { host = h; p.set('host', h); } }

        if (shop || host) {
          window.history.replaceState({}, '', window.location.pathname + '?' + p.toString());
        }

        if (shop) {
          var m = document.createElement('meta');
          m.name = 'shopify-shop';
          m.content = shop;
          document.head.appendChild(m);

          var ab = document.createElement('script');
          ab.src = 'https://cdn.shopify.com/shopifycloud/app-bridge.js';
          // Setting async=false makes document.currentScript.async === false
          // when App Bridge reads it — satisfying App Bridge v4's non-async
          // requirement — without blocking HTML parsing the way a static
          // <script> tag would.
          ab.async = false;
          window.__shopifyAppBridgeReady = new Promise(function (resolve) {
            ab.onload = resolve;
            ab.onerror = resolve;
          });
          document.head.appendChild(ab);
        } else {
          window.__shopifyAppBridgeReady = Promise.resolve();
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
